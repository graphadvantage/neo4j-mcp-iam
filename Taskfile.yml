# https://taskfile.dev

version: "3"

dotenv: [".env.task"]

tasks:
  build:
    cmds:
      - go build -C cmd/neo4j-mcp -o ../../bin/neo4j-iam-mcp {{.CLI_ARGS}}
  run:
    cmds:
      - go run ./cmd/neo4j-mcp
  run:compiled:
    cmds:
      - ./bin/neo4j-iam-mcp {{.CLI_ARGS}}
  dev:watch:
    desc: Rebuild bin/neo4j-iam-mcp whenever source files change
    cmds:
      - ./scripts/dev-rebuild.sh
  dev:watch:install:
    desc: Rebuild and install to /usr/local/bin/neo4j-iam-mcp whenever source files change
    cmds:
      - INSTALL_TO=/usr/local/bin/neo4j-iam-mcp ./scripts/dev-rebuild.sh
  generate:
    cmds:
      - go generate ./...
  # pass CLI args as task:test -- -v
  test:
    cmds:
      - go test ./... {{.CLI_ARGS}}
  test:unit:
    cmds:
      - go test ./internal/... {{.CLI_ARGS}}
  test:int:
    cmds:
      - go test -tags=integration ./test/integration/... {{.CLI_ARGS}}
  test:e2e:
    cmds:
      - go test -tags=e2e ./test/e2e/... {{.CLI_ARGS}}
  test:clean:
    cmds:
      - go clean -testcache
  lint:
    cmds:
      - golangci-lint run
  inspect:
    cmds:
      - npx @modelcontextprotocol/inspector go run ./cmd/neo4j-mcp
  interactive-client:
    cmds:
      - go run ./client/... bin/neo4j-iam-mcp
